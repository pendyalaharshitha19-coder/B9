<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my website</title>
</head>
<body>
    <style>
        body{
            font-family: arial;
            margin:0;
        }

    .header{
        background-color: lightblue;
        padding:20px;
        text-align: center;
    }
    .nav{
        background-color: #333;
        padding: 10px;
        text-align: center;
    }
    .nav a{
        color: white;
        text-decoration: none;
        margin:15px;
        font-size: 18px;
        padding: 8px 12px;
    }
    .nav a:hover{
        background-color: orange;
        color: black;
        border-radius: 5px;  
      }

    .content{
        padding:30px;
        margin:20px;
        border:2px solid gray;
    }

    .footer{
        background-color: lightgray;
        text-align: center;
        padding: 15px;
    }
    </style>

    </head>
    
</body>
</html>
